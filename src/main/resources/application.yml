server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sprintdesk
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:                          # ← 加这里
      host: localhost
      port: 27017
      database: sprintdesk

  jackson:
    serialization:
      write-dates-as-timestamps: false    # ← 加这行
    deserialization:
      fail-on-unknown-properties: false   # ← 加这行

jwt:
  secret: sprintdesk-secret-key-for-jwt-do-not-use-in-production
  expiration: 86400000  # 24 hours in milliseconds