name: Build and Deploy Backend

# 每次 push 到 main 分支触发
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 运行单元测试
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: mvn test -q
        continue-on-error: true  # 暂时允许测试失败，之后写了测试再改

      # 3. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 设置 buildx（支持 linux/amd64）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5. Build 并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sprintdesk-backend:latest

      # 6. SSH 进 EC2 拉新镜像重启容器
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sprintdesk-backend:latest
            docker stop sprintdesk-backend || true
            docker rm sprintdesk-backend || true
            docker run -d \
              --name sprintdesk-backend \
              --network sprintdesk-network \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://sprintdesk-postgres:5432/sprintdesk \
              -e SPRING_DATASOURCE_USERNAME=admin \
              -e SPRING_DATASOURCE_PASSWORD=admin123 \
              -e SPRING_DATA_REDIS_HOST=sprintdesk-redis \
              -e SPRING_DATA_MONGODB_HOST=sprintdesk-mongo \
              ${{ secrets.DOCKERHUB_USERNAME }}/sprintdesk-backend:latest